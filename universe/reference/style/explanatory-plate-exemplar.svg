<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" width="900" height="420">
  <title>Two layers: the rented layer converges to a standard, the moat layer cannot be standardized</title>
  <style>
    .bg{fill:#f7f4ed}.card{fill:#ece7dc;stroke:#e6dfd1;stroke-width:2}
    .ink{fill:#1a1a17}.mute{fill:#6b6862}.clay{fill:#cc785c}
    .rule{stroke:#e6dfd1;stroke-width:2;stroke-linecap:round}
    .clayline{stroke:#cc785c;stroke-width:2.5;stroke-linecap:round}
    .h{font:600 15px system-ui,-apple-system,sans-serif;letter-spacing:.09em}
    .t{font:15px system-ui,-apple-system,sans-serif}
    .k{font:600 26px Georgia,serif}
    .n{font:13px system-ui,-apple-system,sans-serif}
    @media (prefers-color-scheme: dark){
      .bg{fill:#141312}.card{fill:#1e1c1a;stroke:#2f2c28}
      .ink{fill:#f0ede8}.mute{fill:#9a948c}
      .rule{stroke:#2f2c28}
    }
  </style>
  <rect class="bg" width="900" height="420" rx="10"/>

  <!-- left: rented -->
  <rect class="card" x="34" y="30" width="380" height="356" rx="12"/>
  <text class="h mute" x="58" y="66">CONVERGES TO A STANDARD</text>
  <text class="k ink" x="58" y="104">Rent it.</text>
  <line class="rule" x1="58" y1="124" x2="390" y2="124"/>
  <g class="t mute">
    <text x="58" y="158">Sandboxed execution</text>
    <text x="58" y="192">Session persistence</text>
    <text x="58" y="226">Tenant isolation</text>
    <text x="58" y="260">Secret handling</text>
    <text x="58" y="294">Capacity and scheduling</text>
  </g>
  <text class="n mute" x="58" y="346">Every company solving this</text>
  <text class="n mute" x="58" y="364">solves it the same way.</text>

  <!-- divider -->
  <line class="clayline" x1="450" y1="52" x2="450" y2="364"/>

  <!-- right: moat -->
  <rect class="card" x="486" y="30" width="380" height="356" rx="12"/>
  <text class="h clay" x="510" y="66">CANNOT BE STANDARDIZED</text>
  <text class="k ink" x="510" y="104">Build it.</text>
  <line class="rule" x1="510" y1="124" x2="842" y2="124"/>
  <g class="t ink">
    <text x="510" y="158">What your agent knows about</text>
    <text x="510" y="176">your customers' actual work</text>
    <text x="510" y="212">The evals that encode your bar</text>
    <text x="510" y="248">The craft you wrote down</text>
    <text x="510" y="284">The trust you earned</text>
  </g>
  <text class="n mute" x="510" y="346">A competitor can buy the same</text>
  <text class="n mute" x="510" y="364">account. Not these.</text>
</svg>
